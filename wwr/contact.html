<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Cauê Moraes">
    <meta name="description" content="Contact us to ask something or give us some feedback.">
    <link rel="stylesheet" href="../wwr/styles/rafting.css">
    <title>Contact Us | Rafting Travel</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../wwr/images/raftingcompas.jpg" alt="Rafting Site Logo">
        </div>
        <nav class="navigation">
            <a href="../wwr/site-plan-rafting.html">Home</a>
            <a href="../wwr/about.html">About Us</a>
            <a href="#">Trips</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contacth1">
            <h1>Contact Us</h1>
        </div>
        <div class="hero2">
            <h2>Send Us a Message.</h2>
            <div class="address">
                <p>749-721 S 300 W, Salt Lake City, UT 84101, EUA</p>
                <p>Phone: 999-999-9999</p>
                <p>Email: raftingtravel@gmail.com</p>
            </div>
        </div>
        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d229991.78271790917!2d-111.95252462396928!3d40.76502630650299!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1721939165833!5m2!1spt-BR!2sbr" width="400" height="300" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        
        <div class="section">
            <div class="box">
                <figure>
                    <img src="../wwr/images/employee1.jpg" alt="employee1">
                    <figcaption>Jennifer Lawrence - CEO</figcaption>
                </figure>
            </div>
            <div class="box">
                <figure>
                    <img src="../wwr/images/emplyee2.jpg" alt="emplyee2">
                    <figcaption>Jhonny Depp - Marketing Manager</figcaption>
                </figure>
            </div>
            <div class="box">
                <figure>
                    <img src="../wwr/images/employee3.jpg" alt="employee3">
                    <figcaption>Courtney Cox - Communications Director</figcaption>
                </figure>
            </div>
        </div>

        <form>
            <fieldset>
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname">
                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail">
                <p>What is the purpose of the message?</p>
                <div class="radio">
                    <input type="radio" id="general" name="purpose" value="general">
                    <label for="general">General Inquiry</label>
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>
                <label for="message">Type your message:</label>
                <textarea id="message" name="message" rows="4"></textarea>
                <div class="checkbox">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
    </main>

    <footer>
        <p>&copy;2024 | Rafting Travel | Cauê Moraes</p>
        <nav class="sociallinks">
            <a href="https://www.facebook.com/">
                <img src="../wwr/images/facebooklogo.webp" alt="facebook-logo">
            </a>
            <a href="https://www.instagram.com/">
                <img src="../wwr/images/instagramicon.webp" alt="instagram-logo">
            </a>
            <a href="https://www.linkedin.com/">
                <img src="../wwr/images/linkedinicon.webp" alt="linkedin-logo">
            </a>
            <a href="https://app.moqups.com/rY0gz4k7TecURvWJZz8YsKhbnVv66VOy/view/page/ad64222d5">
                <img src="/wwr/images/wireframe-img.png" alt="wireframe-img">
            </a>
        </nav>
    </footer>
</body>
</html>
